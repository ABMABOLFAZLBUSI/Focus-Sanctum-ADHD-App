name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'   # <-- Important: Java 24 for your project

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 platforms;android-36'
      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Sync Capacitor
        run: npx cap sync android

      # --- Decode Keystores ---
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=release.jks" > android/app/keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/keystore.properties
      
      - name: Verify keystore.properties exists
        run: |
          ls -la android/app/keystore.properties
          cat android/app/keystore.properties

      # --- Build DEBUG APK (unsigned) ---
      - name: Build debug APK
        run: |
          cd android
          gradle wrapper --gradle-version 8.14.3
          ./gradlew --stop
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # --- Build RELEASE APK (signed) ---
      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/**/*.apk
